<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>About Us – Anuj Multimedia | Our Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,600&family=Playfair+Display:ital,wght@0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9963A;--gold-light:#E8C97A;--gold-pale:#F5EDD6;--copper:#D98B6B;--copper-deep:#B65C3F;--cream:#FAF6F0;--dark:#15100D;--dark2:#2A1A12;--charcoal:#3D2E24;--text:#4A3F38;--text-light:#8A7A70;--white:#FFFFFF;--blush:#F3D9CE}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--white);overflow-x:hidden}
::selection{background:var(--gold-light);color:var(--dark)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:transparent;border-bottom:1px solid transparent;transition:all .35s}
nav.scrolled{padding:12px 60px;background:rgba(21,16,13,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,150,58,.18)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-icon{width:42px;height:42px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold-light);font-family:'Playfair Display',serif;font-style:italic;font-size:19px;font-weight:700;background:radial-gradient(circle,rgba(201,150,58,.15),transparent)}
.nav-logo-text{line-height:1.05}
.nav-logo-text .name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--white);letter-spacing:1px}
.nav-logo-text .sub{font-size:9px;color:var(--gold-light);letter-spacing:4px;text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{color:rgba(255,255,255,.88);text-decoration:none;font-size:13px;letter-spacing:.6px;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;left:0;bottom:-6px;width:0;height:1px;background:var(--gold);transition:width .25s}
.nav-links a:hover,.nav-links a.active{color:var(--gold-light)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.btn-book{background:var(--gold);color:var(--dark);padding:11px 24px;border:none;border-radius:50px;font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:8px;transition:all .3s;box-shadow:0 4px 18px rgba(201,150,58,.25);cursor:pointer}
.btn-book:hover{background:var(--gold-light);transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:all .3s}
.mobile-menu{display:none;position:fixed;inset:0;z-index:999;background:rgba(21,16,13,.98);flex-direction:column;align-items:center;justify-content:center;gap:34px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--white);font-size:22px;text-decoration:none;font-family:'Cormorant Garamond',serif;font-weight:600;transition:color .2s}
.mobile-menu a:hover{color:var(--gold)}
.mobile-close{position:absolute;top:24px;right:30px;color:var(--white);font-size:28px;cursor:pointer;background:none;border:none}
/* HERO */
.page-hero{position:relative;min-height:80vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1600&q=80') center/cover no-repeat;transform:scale(1.06);animation:heroZoom 20s ease-in-out infinite alternate}
@keyframes heroZoom{from{transform:scale(1.06)}to{transform:scale(1.13)}}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(21,16,13,.92) 0%,rgba(42,26,18,.75) 50%,rgba(21,16,13,.65) 100%)}
.hero-petals{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.petal{position:absolute;width:8px;height:12px;border-radius:50% 0 50% 0;animation:petalFall linear infinite}
.hero-content{position:relative;z-index:3;text-align:center;padding:120px 24px 80px;max-width:800px}
.breadcrumb{color:rgba(255,255,255,.45);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;animation:fadeInUp .6s ease both}
.breadcrumb a{color:var(--gold-light);text-decoration:none}
.hero-eyebrow{color:var(--gold-light);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px;animation:fadeInUp .65s .1s ease both}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:30px;height:1px;background:var(--gold-light)}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(42px,6vw,74px);font-weight:700;color:var(--white);line-height:1.07;margin-bottom:8px;animation:fadeInUp .7s .15s ease both}
.hero-italic{font-family:'Playfair Display',serif;font-size:clamp(30px,4vw,52px);font-style:italic;font-weight:600;background:linear-gradient(100deg,var(--gold-light),var(--copper) 70%);-webkit-background-clip:text;background-clip:text;color:transparent;display:block;margin-bottom:24px;animation:fadeInUp .7s .25s ease both}
.page-hero p{color:rgba(255,255,255,.72);font-size:15px;line-height:1.7;max-width:520px;margin:0 auto 36px;animation:fadeInUp .7s .35s ease both}
.scroll-hint{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,rgba(201,150,58,.8),transparent);animation:pulse 2s infinite}
/* STORY */
.story-section{padding:110px 60px;background:var(--white);position:relative;overflow:hidden}
.story-section::before{content:'';position:absolute;right:-100px;top:50%;transform:translateY(-50%);width:400px;height:400px;background:radial-gradient(ellipse,rgba(201,150,58,.06),transparent 70%);pointer-events:none}
.story-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.story-img-wrap{position:relative}
.story-img-frame{position:absolute;top:-20px;left:-20px;right:20px;bottom:20px;border:2px solid rgba(201,150,58,.3);border-radius:22px;z-index:0}
.story-img-wrap img{position:relative;z-index:1;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:20px;box-shadow:0 30px 70px rgba(60,30,18,.2)}
.story-badge{position:absolute;bottom:-28px;right:-28px;z-index:2;background:var(--gold);color:var(--dark);border-radius:16px;padding:22px 26px;text-align:center;box-shadow:0 16px 40px rgba(201,150,58,.35)}
.story-badge .num{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;line-height:1}
.story-badge .lbl{font-size:11px;letter-spacing:.5px;margin-top:4px;text-transform:uppercase;line-height:1.4}
.section-label{color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-label::before,.section-label::after{content:'';width:30px;height:1px;background:var(--gold)}
.story-text h2{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,46px);font-weight:600;color:var(--dark);line-height:1.2;margin-bottom:22px}
.story-text p{color:var(--text-light);font-size:14px;line-height:1.85;margin-bottom:18px}
.story-points{list-style:none;margin:24px 0 32px}
.story-points li{display:flex;align-items:flex-start;gap:14px;font-size:14px;color:var(--text);margin-bottom:14px;line-height:1.5}
.story-points li .pt-icon{color:var(--gold);font-size:16px;flex-shrink:0;margin-top:1px}
